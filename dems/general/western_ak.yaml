project:
  name: "Western_AK_Test"
  description: >
    This run executes the shared Western Alaska recipe. It gathers elevation
    and bathymetry inputs for the area, including Copernicus, MBDB, NOAA hydro
    (BAG/XYZ), chart soundings, and eHydro. Source data is filtered, unzipped,
    spatially cropped, and reprojected to EPSG:4326+3855.
    The inputs are combined into a weighted raster stack (test_ak_stack.tif)
    at approximately 1 arc-second resolution. This stack is blended in two
    passes to smooth overlaps, and then a CUDEM-style step-down interpolation
    is applied at 1s / 3s / 9s scales using the coastline as a barrier to
    generate the final seamless terrain surface (western_alaska_dem.tif).

execution:
  threads: 4

# schema: crm
region: [-166.0, -162.5, 62.0, 63.5]

# -----------------------------------------------------------------------------
# DATA MODULES (Sources)
# -----------------------------------------------------------------------------
modules:
  - module: copernicus
    args: {weight: 1.5, datatype: 3}
    hooks:
      - name: unzip
      - name: filename_filter
        args: {match: ".tif"}
      - name: stream_data
        args: {chunk_size: 100000}
      - name: range_z
        args: {min_z: 0.01}

  - module: copernicus
    args: {weight: .75, datatype: 1}
    hooks:
      - name: unzip
      - name: filename_filter
        args: {match: ".tif"}
      - name: stream_data
        args: {chunk_size: 100000}
      - name: range_z
        args: {min_z: 0.01}

  # Bathymetry
  # - module: gebco_cog
  #   args: {weight: 0.01}
  #   hooks:
  #     - name: raster_clip
  #       args:
  #         barrier: "coastline"
  #         invert: True
  #     - name: stream_data
  #       args: {chunk_size: 100000}
  #     - name: range_z
  #       args: {max_z: -0.1}

  - module: mbdb
    args: {weight: 0.75, want_inf: False}
    hooks:
      # - preset: fbt_only
      # - name: filename_filter
      #   args: {exclude: ".inf", stage: "pre"}
      - name: stream_data
        #args: {chunk_size: 100000}
      - name: stream_reproject
        args: {src_srs: "EPSG:4326+9003", dst_srs: "EPSG:4326+3855"}
      - name: spatial_crop
      - name: rq
        args:
          reference: "gmrt"
          threshold: 10
          mode: "percent"
          builder: "grid"
          res: 0.008333

  - module: nos_hydro
    args: {datatype: "bag", weight: 1.25}
    hooks:
      - name: filename_filter
        args: {exclude: "_Ellipsoid_", stage: "pre"}
      - name: stream_data
       # args: {chunk_size: 100000}
      - name: stream_reproject
        args: {dst_srs: "EPSG:4326+3855"}
      - name: spatial_crop

  - module: nos_hydro
    args: {datatype: "xyz", weight: 0.35}
    hooks:
      - name: unzip
      - name: set_datatype
        args: {data_type: "nos_xyz"}
      - name: stream_data
       # args: {chunk_size: 100000}
      - name: stream_reproject
        args: {src_srs: "EPSG:4326+5866", dst_srs: "EPSG:4326+3855"}
      - name: spatial_crop

  - module: charts
    args: {weight: 0.15}
    hooks:
      - name: unzip
      - name: filename_filter
        args: {match: ".000", stage: "file"}
      - name: set_datatype
        args: {data_type: "charts_000"}
      - name: stream_data
       # args: {chunk_size: 100000}
      - name: stream_reproject
        args: {src_srs: "EPSG:4326+5866", dst_srs: "EPSG:4326+3855"}
      - name: spatial_crop

  - module: ehydro
    args: {weight: 0.85}
    hooks:
      - name: unzip
      - name: filename_filter
        args: {match: ".gdb", stage: "file"}
      - name: stream_data
       # args: {chunk_size: 100000}
      - name: stream_reproject
        args: {dst_srs: "EPSG:4326+3855"}
      - name: spatial_crop

# -----------------------------------------------------------------------------
# GLOBAL POST-HOOKS (Stack & Blend & Interpolation)
# -----------------------------------------------------------------------------
global_hooks:
  - name: audit
  - name: drop_class

- name: source_masks
    args:
      res: 0.0002777777777777778  # Match your stack resolution!
      output_dir: "ak_debug_masks"
      vrt_name: "western_ak_sources.vrt"

  - name: provenance
    args:
      res: "1s"
      output: "western_ak_provenance.tif"

  # Build the Multi-Band Stack
  - name: multi_stack
    args:
      res: 0.0002777777777777778
      mode: "mixed"
      weight_threshold: ".3/1"
      crs: "EPSG:4326"
      output: "test_ak_stack.tif"

  # Focus the pipeline on the Stack
  - name: focus_sink
    args:
      target: "multi_stack"

  # Reignite the pipeline using RasterStream
  - name: raster_stream
    args:
      stream_type: "raster"
      chunk_size: 2048
      stage: "collection"

  # --- IN MEMORY FILTERS ---
  - name: ms_blend
    args: {weight_threshold: 1.0, blend_dist: 20, random_scale: .25}

  - name: ms_blend
    args: {weight_threshold: 0.3, blend_dist: 50, random_scale: .25}

  # Writes the blended data to disk without breaking the stream
  - name: raster_write
    args:
      suffix: "_final_blend"
      artifact_id: "blended_checkpoint"

  # Drop the stream, update dst_fn, and focus on the blended raster
  - name: focus_sink
    args: {target: "blended_checkpoint"}

  # --- Build the DEM using the CUDEM "step-down" multi-resolution interpolation! ---
  - name: ms_cudem
    args:
      steps: 2
      weights: "1.0/0.5/0.0001"
      resolutions: "1s/3s/9s"
      barrier: "coastline"
      algo: "interp_gmt"
      output: "western_alaska_dem.tif"

  - name: viz_geoshade
    args:
      stage: "collection"
